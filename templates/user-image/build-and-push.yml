# Template: copy this into your fork as .github/workflows/build-agent-image.yml
#
# Builds templates/user-image/Dockerfile and pushes to your fork's GHCR on any
# push to main that touches the Dockerfile. The resulting image ref is:
#
#   ghcr.io/<your-github-username>/autopilot-ws-custom:latest
#   ghcr.io/<your-github-username>/autopilot-ws-custom@sha256:<digest>
#
# Wire it into your caller workflow like:
#
#   jobs:
#     agent:
#       uses: clockwork-pilot/autopilot/.github/workflows/coding-agent.yml@v1
#       with:
#         runner_label: ${{ github.actor }}
#         issue_number: ${{ github.event.issue.number }}
#         agent_image:  ghcr.io/${{ github.repository_owner }}/autopilot-ws-custom:latest
#
# For a private image, add a `docker login ghcr.io` step to your caller
# workflow before `uses:`, or make the GHCR package public.

name: Build agent image

on:
  push:
    branches: [main]
    paths:
      - "templates/user-image/Dockerfile"
      - ".github/workflows/build-agent-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: templates/user-image
          file: templates/user-image/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/autopilot-ws-custom:latest
            ghcr.io/${{ github.repository_owner }}/autopilot-ws-custom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
