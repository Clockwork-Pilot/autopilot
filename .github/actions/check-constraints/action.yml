name: check-constraints
description: Run check_spec_constraints.py inside a prepared docker image. Image preparation (pull or build) is the caller's responsibility — use ensure-docker-image upstream of this step.

inputs:
  image:
    description: Local docker image ref produced by ensure-docker-image (or equivalent). The image must be an autopilot-ws-compatible runtime.
    required: true
  command:
    description: Command to run inside the image. Default runs the constraint checker.
    required: false
    default: check_spec_constraints.py

runs:
  using: composite
  steps:
    - name: Alias image to the tag run-in-docker-no-claude.sh expects
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: docker tag "$IMAGE" ghcr.io/clockwork-pilot/autopilot-ws:cached

    - name: Run check inside image
      shell: bash
      env:
        AGENT_IMAGE: ghcr.io/clockwork-pilot/autopilot-ws:cached
        CMD: ${{ inputs.command }}
      run: bash "$GITHUB_ACTION_PATH/../../scripts/run-in-docker-no-claude.sh" "$CMD"
