name: check-constraints
description: Run check_spec_constraints.py inside a prepared docker image. Image preparation (pull or build) is the caller's responsibility — use ensure-docker-image upstream of this step.

inputs:
  image:
    description: Local docker image ref produced by ensure-docker-image (or equivalent). Must be an autopilot-ws-compatible runtime.
    required: true
  command:
    description: Command to run inside the image. Default runs the constraint checker.
    required: false
    default: check_spec_constraints.py
  extra_docker_args:
    description: Extra args spliced into `docker run` (forwarded as CLAUDE_EXTRA_DOCKER_ARGS).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run check inside image
      shell: bash
      env:
        AGENT_IMAGE: ${{ inputs.image }}
        CMD: ${{ inputs.command }}
        CLAUDE_EXTRA_DOCKER_ARGS: ${{ inputs.extra_docker_args }}
      run: bash "$GITHUB_ACTION_PATH/../../scripts/run-in-docker-no-claude.sh" "$CMD"
