name: choose-branch
description: Pick the agent work branch and base branch given override precedence.

inputs:
  pr_branch:             { required: false, default: "", description: Explicit branch from frontmatter. }
  agent_branch_default:  { required: true,  description: Default agent branch if nothing else is set. }
  existing_agent_branch: { required: false, default: "", description: "Existing agent branch, if any." }
  base_from_issue:       { required: false, default: "", description: Base branch override from frontmatter. }
  default_branch:        { required: true,  description: Repo default branch (fallback base). }

outputs:
  branch:      { description: Chosen work branch.,  value: "${{ steps.c.outputs.branch }}" }
  base_branch: { description: Chosen base branch., value: "${{ steps.c.outputs.base_branch }}" }

runs:
  using: composite
  steps:
    - id: c
      shell: bash
      env:
        PR_BRANCH:             ${{ inputs.pr_branch }}
        AGENT_BRANCH_DEFAULT:  ${{ inputs.agent_branch_default }}
        EXISTING_AGENT_BRANCH: ${{ inputs.existing_agent_branch }}
        BASE_FROM_ISSUE:       ${{ inputs.base_from_issue }}
        DEFAULT_BRANCH:        ${{ inputs.default_branch }}
      run: bash "$GITHUB_ACTION_PATH/script.sh"
