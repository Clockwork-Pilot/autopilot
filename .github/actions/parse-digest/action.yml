name: parse-digest
description: Parse a docker manifest JSON and emit the digest plus `<repo>@<digest>` image ref.

inputs:
  manifest_json:
    description: Docker manifest JSON (single or manifest-list).
    required: true
  image_repo:
    description: Registry repo (e.g. ghcr.io/org/name), no tag.
    required: true

outputs:
  digest:
    description: Manifest digest (sha256:...).
    value: ${{ steps.p.outputs.digest }}
  image:
    description: Digest-pinned image ref.
    value: ${{ steps.p.outputs.image }}

runs:
  using: composite
  steps:
    - id: p
      shell: bash
      env:
        MANIFEST_JSON: ${{ inputs.manifest_json }}
        IMAGE_REPO:    ${{ inputs.image_repo }}
      run: bash "$GITHUB_ACTION_PATH/script.sh"
