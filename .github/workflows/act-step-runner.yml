name: Act Step Runner

on:
  workflow_call:
    inputs:
      workflow:
        description: 'Target workflow file (e.g., coding-agent.yml)'
        required: true
        type: string
      step_id:
        description: 'Step (job) id to run from the target workflow'
        required: true
        type: string
      inputs_json:
        description: 'JSON payload of inputs for the step'
        required: false
        type: string
        default: '{}'
      artifact_path:
        description: 'Base path for artifacts'
        required: false
        type: string
        default: /tmp/act-artifacts

jobs:
  executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Dispatch
        run: |
          bash .github/scripts/act-step-dispatch.sh "${{ inputs.workflow }}" "${{ inputs.step_id }}" --inputs '${{ inputs.inputs_json }}' --artifact-server-path "${{ inputs.artifact_path }}"

  # Composite-action test wrappers. Each job mirrors the env: shape of the
  # original workflow job, so fixtures under .github/scripts/test/fixtures/<id>
  # that key on expressions like "needs.fetch-issue.outputs.title" keep working
  # when the test script targets `act-step-runner.yml <id>`. The run: step
  # invokes the composite action's script directly (bypassing `uses:`), which
  # is what act-step-dispatch.sh can execute.

  parse-issue:
    runs-on: ubuntu-latest
    env:
      TITLE:        ${{ needs.fetch-issue.outputs.title }}
      BODY_RAW:     ${{ needs.fetch-issue.outputs.body_raw }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: bash .github/actions/parse-issue/script.sh

  choose-branch:
    runs-on: ubuntu-latest
    env:
      PR_BRANCH:             ${{ needs.parse-issue.outputs.pr_branch }}
      AGENT_BRANCH_DEFAULT:  ${{ needs.parse-issue.outputs.agent_branch_default }}
      EXISTING_AGENT_BRANCH: ${{ needs.gather-repo-facts.outputs.existing_agent_branch }}
      BASE_FROM_ISSUE:       ${{ needs.parse-issue.outputs.base_branch }}
      DEFAULT_BRANCH:        ${{ needs.gather-repo-facts.outputs.default_branch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: bash .github/actions/choose-branch/script.sh

  parse-digest:
    runs-on: ubuntu-latest
    env:
      MANIFEST_JSON: ${{ needs.fetch-manifest.outputs.manifest_json }}
      IMAGE_REPO:    ${{ inputs.image_repo }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: bash .github/actions/parse-digest/script.sh
