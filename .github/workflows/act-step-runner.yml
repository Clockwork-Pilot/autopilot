name: Act Step Runner

on:
  workflow_call:
    inputs:
      workflow:
        description: 'Target workflow file (e.g., coding-agent.yml)'
        required: true
        type: string
      step_id:
        description: 'Step (job) id to run from the target workflow'
        required: true
        type: string
      inputs_json:
        description: 'JSON payload of inputs for the step'
        required: false
        type: string
        default: '{}'
      artifact_path:
        description: 'Base path for artifacts'
        required: false
        type: string
        default: /tmp/act-artifacts

jobs:
  executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Dispatch
        run: |
          bash .github/scripts/test/act-step-dispatch.sh "${{ inputs.workflow }}" "${{ inputs.step_id }}" --inputs '${{ inputs.inputs_json }}' --artifact-server-path "${{ inputs.artifact_path }}"

  # Composite-action test wrappers. Each job invokes the composite action via
  # `uses: ./.github/actions/<id>` with `with:` expressions matching the fixture
  # input.json keys (e.g. "needs.fetch-issue.outputs.title"). act-step-dispatch.sh
  # resolves those expressions against --inputs, then drives the composite
  # action through its action.yml — so action.yml metadata (inputs, outputs,
  # env wiring) is exercised on every test run.

  parse-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/parse-issue
        with:
          title:        ${{ needs.fetch-issue.outputs.title }}
          body_raw:     ${{ needs.fetch-issue.outputs.body_raw }}
          issue_number: ${{ inputs.issue_number }}

  choose-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/choose-branch
        with:
          pr_branch:             ${{ needs.parse-issue.outputs.pr_branch }}
          agent_branch_default:  ${{ needs.parse-issue.outputs.agent_branch_default }}
          existing_agent_branch: ${{ needs.gather-repo-facts.outputs.existing_agent_branch }}
          base_from_issue:       ${{ needs.parse-issue.outputs.base_branch }}
          default_branch:        ${{ needs.gather-repo-facts.outputs.default_branch }}
