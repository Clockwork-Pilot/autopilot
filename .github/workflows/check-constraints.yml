name: Check Constraints

# Reusable workflow: pairs ensure-docker-image with the dumb check-constraints
# runner. Consumers get two explicit, visible steps in the run graph:
# 1) image preparation (with cache hit/miss legible), 2) the constraint check.
# Consumers that want the flat run-graph form can bypass this shim and wire
# both actions themselves.
on:
  workflow_call:
    inputs:
      submodules:
        description: |
          Forwarded to actions/checkout. Set to "true" or "recursive" when
          project.k.json declares specs inside submodule paths; otherwise
          those spec.k.json files will be missing at constraint-check time.
        required: false
        type: string
        default: ""
      dockerfile:
        description: |
          Optional Dockerfile path. When unset, the check runs against
          ghcr.io/clockwork-pilot/autopilot-ws as-is. When set, a derived
          image is built and used instead. The Dockerfile must FROM an
          autopilot-ws-compatible base.
        required: false
        type: string
        default: ""
      build_args:
        description: Newline-separated KEY=VALUE build args, forwarded to ensure-docker-image.
        required: false
        type: string
        default: ""
      cache_key_prefix:
        description: |
          REQUIRED. Namespace for the image cache. See
          .github/actions/ensure-docker-image/README.md for guidelines.
          Use e.g. `${{ github.repository }}-check-img`.
        required: true
        type: string

jobs:
  check-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: ${{ inputs.submodules }}

      - id: image
        uses: Clockwork-Pilot/autopilot/.github/actions/ensure-docker-image@main
        with:
          dockerfile:       ${{ inputs.dockerfile }}
          build_args:       ${{ inputs.build_args }}
          base_image:       ghcr.io/clockwork-pilot/autopilot-ws:latest
          tag:              autopilot-check
          cache_key_prefix: ${{ inputs.cache_key_prefix }}

      - uses: Clockwork-Pilot/autopilot/.github/actions/check-constraints@main
        with:
          image: ${{ steps.image.outputs.image }}
