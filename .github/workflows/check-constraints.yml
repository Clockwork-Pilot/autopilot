name: Check Constraints

# Reusable workflow: pairs ensure-docker-image with the dumb check-constraints
# runner. Consumers get two explicit, visible steps in the run graph:
# 1) image preparation (with cache hit/miss legible), 2) the constraint check.
# Consumers that want the flat run-graph form can bypass this shim and wire
# both actions themselves.
on:
  workflow_call:
    inputs:
      submodules:
        description: |
          Forwarded to actions/checkout. Set to "true" or "recursive" when
          project.k.json declares specs inside submodule paths; otherwise
          those spec.k.json files will be missing at constraint-check time.
        required: false
        type: string
        default: ""
      base_image:
        description: |
          Autopilot-ws-compatible runtime image the check runs against.
          Pulled + tagged when `dockerfile` is unset; used as FROM contract
          when set. Consumer caller supplies this — autopilot carries no
          built-in registry ref.
        required: true
        type: string
      dockerfile:
        description: |
          Optional Dockerfile path. When unset, the check runs against
          `base_image` as-is. When set, a derived image is built from
          `base_image` and the check runs against that.
        required: false
        type: string
        default: ""
      build_args:
        description: Newline-separated KEY=VALUE build args, forwarded to ensure-docker-image.
        required: false
        type: string
        default: ""
      tag_prefix:
        description: |
          REQUIRED. Project tag/cache namespace. See
          .github/actions/ensure-docker-image/README.md for the dual
          role (tag partition + Buildx GHA cache scope).
          Use e.g. `<owner>/<repo>-check-img` (i.e. github.repository + a suffix).
        required: true
        type: string

jobs:
  check-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: ${{ inputs.submodules }}

      - id: image
        uses: Clockwork-Pilot/autopilot/.github/actions/ensure-docker-image@main
        with:
          dockerfile:       ${{ inputs.dockerfile }}
          build_args:       ${{ inputs.build_args }}
          base_image:       ${{ inputs.base_image }}
          tag:              autopilot-check
          tag_prefix:       ${{ inputs.tag_prefix }}

      - uses: Clockwork-Pilot/autopilot/.github/actions/check-constraints@main
        with:
          image: ${{ steps.image.outputs.image }}
