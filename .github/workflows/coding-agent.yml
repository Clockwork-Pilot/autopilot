name: Coding Agent

# Pure-library reusable workflow: callable only via `uses:` from a consumer
# caller workflow (see autopilot-selftest for the canonical caller shape).
# The consumer owns the event trigger (workflow_dispatch, issues labels,
# etc.); this file is the implementation contract and nothing more.
on:
  workflow_call:
    inputs:
      runner_label:
        description: GitHub username (matches self-hosted runner label)
        required: true
        type: string
      issue_number:
        description: Issue number to work on
        required: true
        type: string
      base_image:
        description: |
          Autopilot-ws-compatible runtime image (USER node, tools on PATH). Used
          by the internal image-digest job to resolve a digest-pinned ref, and
          as the build FROM contract when a Dockerfile is supplied. Required —
          consumers supply this so autopilot has no built-in coupling to any
          specific registry ref. Not used when `docker_image` is set.
        required: true
        type: string
      docker_image:
        description: |
          Pre-built local docker tag to use as-is. When set, prepare-image skips
          ensure-docker-image entirely and hands this ref to run-agent. Intended
          for consumers who hoist image preparation into a separate job via
          ensure-docker-image.yml. Requires that upstream job and this workflow's
          self-hosted jobs to land on the SAME runner (local tags don't cross
          docker daemons). Mutually exclusive with `dockerfile:` — when set,
          dockerfile/build_args/tag_prefix are ignored.
        required: false
        type: string
        default: ""
      agent_image:
        description: |
          Override base image with a specific tag or digest (fallback path, used
          when docker_image is unset). If unset, resolves the latest digest of
          `base_image` via the image-digest job.
        required: false
        type: string
        default: ""
      dockerfile:
        description: |
          Optional Dockerfile path (fallback path, used when docker_image is unset).
          Must FROM an autopilot-ws-compatible base (USER node). When set, prepare-image
          builds via ensure-docker-image.
        required: false
        type: string
        default: ""
      build_args:
        description: Newline-separated KEY=VALUE build args, forwarded to ensure-docker-image.
        required: false
        type: string
        default: ""
      tag_prefix:
        description: |
          Project tag/cache namespace used when prepare-image builds internally.
          Required when `docker_image` is unset; ignored when `docker_image` is set.
          See .github/actions/ensure-docker-image/README.md for the dual role
          (tag partition + Buildx GHA cache scope).
          Use e.g. `<owner>/<repo>-agent-img` (i.e. github.repository + a suffix).
        required: false
        type: string
        default: ""
    secrets:
      UPSTREAM_PR_TOKEN:
        description: PAT used by open-upstream-pr when merge_into_upstream is true. Optional — only issues that opt in require it.
        required: false

jobs:
  fetch-issue:
    runs-on: ubuntu-latest
    outputs:
      title:    ${{ steps.f.outputs.title }}
      body_raw: ${{ steps.f.outputs.body_raw }}
    steps:
      - name: fetch
        id: f
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO:         ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          J=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER")
          echo "title=$(echo "$J" | jq -r .title)" >> "$GITHUB_OUTPUT"
          { echo "body_raw<<EOF_BODY_RAW"; echo "$J" | jq -r '.body // ""'; echo "EOF_BODY_RAW"; } >> "$GITHUB_OUTPUT"

  # Verified by: step_output_checks/parse_issue_via_action
  parse-issue:
    needs: fetch-issue
    runs-on: ubuntu-latest
    # env: block retained for the coding_agent_steps/parse_issue_consumes_fetch_issue
    # invariant (asserts this job's inputs come from fetch-issue / workflow inputs).
    # Values are also forwarded via `with:` to the composite action below.
    env:
      TITLE:        ${{ needs.fetch-issue.outputs.title }}
      BODY_RAW:     ${{ needs.fetch-issue.outputs.body_raw }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      agent_task_text:      ${{ steps.p.outputs.agent_task_text }}
      pr_branch:            ${{ steps.p.outputs.pr_branch }}
      base_branch:          ${{ steps.p.outputs.base_branch }}
      timeout_secs:         ${{ steps.p.outputs.timeout_secs }}
      model:                ${{ steps.p.outputs.model }}
      agent_branch_default: ${{ steps.p.outputs.agent_branch_default }}
      merge_into_upstream:  ${{ steps.p.outputs.merge_into_upstream }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: p
        uses: Clockwork-Pilot/autopilot/.github/actions/parse-issue@main
        with:
          title:        ${{ needs.fetch-issue.outputs.title }}
          body_raw:     ${{ needs.fetch-issue.outputs.body_raw }}
          issue_number: ${{ inputs.issue_number }}

  validate-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Validate runner availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_LABEL: ${{ inputs.runner_label }}
        run: |
          echo "::group::Validating Runner"
          echo "Checking for self-hosted runner with label: $RUNNER_LABEL"

          runners=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '.runners[] | select(.labels[].name == "'$RUNNER_LABEL'") | .id' 2>/dev/null || echo "")

          if [ -z "$runners" ]; then
            echo "::error::No self-hosted runner found with label '$RUNNER_LABEL'"
            echo ""
            echo "Available runners:"
            gh api repos/${{ github.repository }}/actions/runners \
              --jq '.runners[] | "\(.id): \(.name) (labels: \(.labels[].name | join(", ")))"' || true
            exit 1
          fi

          echo "✓ Found runner(s) with label: $RUNNER_LABEL"
          echo "::endgroup::"

  gather-repo-facts:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
      REPO:         ${{ github.repository }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    outputs:
      existing_agent_branch: ${{ steps.g.outputs.existing_agent_branch }}
      default_branch:        ${{ steps.g.outputs.default_branch }}
    steps:
      - name: gather
        id: g
        run: |
          EXISTING=$(gh api "repos/$REPO/branches" --paginate -q ".[].name" \
            | grep -E "^agent/$ISSUE_NUMBER(-|$)" | head -1 || true)
          DEFAULT=$(gh api "repos/$REPO" -q .default_branch)
          echo "existing_agent_branch=$EXISTING" >> "$GITHUB_OUTPUT"
          echo "default_branch=$DEFAULT" >> "$GITHUB_OUTPUT"

  # Verified by: step_output_checks/choose_branch_via_action
  choose-branch:
    needs: [parse-issue, gather-repo-facts]
    runs-on: ubuntu-latest
    # env: retained so act-step-dispatch.sh can resolve fixture inputs. The
    # same values are forwarded to the composite action via `with:`.
    env:
      PR_BRANCH:             ${{ needs.parse-issue.outputs.pr_branch }}
      AGENT_BRANCH_DEFAULT:  ${{ needs.parse-issue.outputs.agent_branch_default }}
      EXISTING_AGENT_BRANCH: ${{ needs.gather-repo-facts.outputs.existing_agent_branch }}
      BASE_FROM_ISSUE:       ${{ needs.parse-issue.outputs.base_branch }}
      DEFAULT_BRANCH:        ${{ needs.gather-repo-facts.outputs.default_branch }}
    outputs:
      branch:      ${{ steps.c.outputs.branch }}
      base_branch: ${{ steps.c.outputs.base_branch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - id: c
        uses: Clockwork-Pilot/autopilot/.github/actions/choose-branch@main
        with:
          pr_branch:             ${{ needs.parse-issue.outputs.pr_branch }}
          agent_branch_default:  ${{ needs.parse-issue.outputs.agent_branch_default }}
          existing_agent_branch: ${{ needs.gather-repo-facts.outputs.existing_agent_branch }}
          base_from_issue:       ${{ needs.parse-issue.outputs.base_branch }}
          default_branch:        ${{ needs.gather-repo-facts.outputs.default_branch }}

  # Always runs (cheap: one `docker manifest inspect` call). Its output is
  # ignored when inputs.agent_image is set — prepare-image picks the override
  # in that case. Keeping it unconditional means every downstream job can rely
  # on the default success() gate instead of custom skip-tolerant conditions.
  image-digest:
    uses: Clockwork-Pilot/autopilot/.github/workflows/image-digest.yml@main
    with:
      image_repo: ${{ inputs.base_image }}

  # Resolves the image for run-agent. Two modes:
  #   - docker_image set → short-circuit, echo it back (consumer pre-built via
  #     ensure-docker-image.yml on the same runner).
  #   - docker_image unset → run ensure-docker-image internally, using dockerfile
  #     if supplied or just pulling autopilot-ws otherwise.
  prepare-image:
    needs: [validate-runner, image-digest]
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Validate inputs
        if: inputs.docker_image == '' && inputs.tag_prefix == ''
        run: |
          echo "::error::tag_prefix is required when docker_image is unset"
          exit 1

      - name: Short-circuit to pre-built image
        id: passthrough
        if: inputs.docker_image != ''
        env:
          DOCKER_IMAGE: ${{ inputs.docker_image }}
        run: echo "image=$DOCKER_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Checkout caller repo (for Dockerfile access)
        if: inputs.docker_image == '' && inputs.dockerfile != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build or pull image internally
        id: internal
        if: inputs.docker_image == ''
        uses: Clockwork-Pilot/autopilot/.github/actions/ensure-docker-image@main
        with:
          dockerfile:       ${{ inputs.dockerfile }}
          build_args:       ${{ inputs.build_args }}
          base_image:       ${{ inputs.agent_image != '' && inputs.agent_image || needs.image-digest.outputs.image }}
          tag:              autopilot-agent
          tag_prefix:       ${{ inputs.tag_prefix }}

      - name: Resolve final image ref
        id: resolve
        env:
          PASSTHROUGH: ${{ steps.passthrough.outputs.image }}
          INTERNAL:    ${{ steps.internal.outputs.image }}
        run: |
          if [ -n "$PASSTHROUGH" ]; then
            echo "image=$PASSTHROUGH" >> "$GITHUB_OUTPUT"
          else
            echo "image=$INTERNAL"    >> "$GITHUB_OUTPUT"
          fi

  run-agent:
    needs: [validate-runner, fetch-issue, parse-issue, choose-branch, image-digest, prepare-image]
    runs-on: [self-hosted, "${{ inputs.runner_label }}"]
    outputs:
      has_new_commit:  ${{ steps.detect-new-commit.outputs.has_new_commit }}
      agent_exit_code: ${{ steps.agent.outputs.exit_code }}
      constraints_md:  ${{ steps.constraints-out.outputs.body }}
      commit_msg:      ${{ steps.commit-msg.outputs.body }}
    permissions:
      contents: write
    steps:
      - name: Checkout repo into isolated workspace
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout work branch
        env:
          BRANCH:      ${{ needs.choose-branch.outputs.branch }}
          BASE_BRANCH: ${{ needs.choose-branch.outputs.base_branch }}
        run: |
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            echo "::notice::Resuming existing work branch: $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "::notice::Creating new work branch: $BRANCH (base: $BASE_BRANCH)"
            git checkout -B "$BRANCH" "origin/$BASE_BRANCH"
          fi

      - name: Prepare docker-files directories
        run: |
          # DOCKER_FILES must be set in the self-hosted runner's service env
          # (e.g. actions-runner/.env). It points at the host dir holding
          # persistent Claude credentials/cargo caches mounted into the agent.
          : "${DOCKER_FILES:?DOCKER_FILES not set in runner env — configure it in the runner service env (actions-runner/.env)}"
          mkdir -p "$DOCKER_FILES/.credentials" "$DOCKER_FILES/.cargo" "$DOCKER_FILES/.local"
          [ -s "$DOCKER_FILES/.claude.local.json" ] || printf '{}\n' > "$DOCKER_FILES/.claude.local.json"

      # Image is either (a) locally built by prepare-image, or (b) a registry
      # ref. docker run will pull (b) lazily; (a) is already present. If the
      # consumer's base_image/agent_image is private, they must configure a
      # docker login step earlier in their own caller workflow.

      - name: Run Claude agent in Docker
        id: agent
        env:
          MODEL:        ${{ needs.parse-issue.outputs.model }}
          TIMEOUT_SECS: ${{ needs.parse-issue.outputs.timeout_secs }}
          PROMPT:       ${{ needs.parse-issue.outputs.agent_task_text }}
          AGENT_IMAGE:  ${{ needs.prepare-image.outputs.image }}
        run: |
          echo "::group::Claude Agent Output"
          set +e
          bash .github/scripts/run-in-docker-claude.sh
          EXIT_CODE=$?
          echo "::endgroup::"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run constraint checks
        id: constraints
        if: always()
        env:
          AGENT_IMAGE: ${{ needs.prepare-image.outputs.image }}
        run: |
          # stdout → issue comment; exit code gates the commit step.
          set +e
          # Re-display the constraint report the in-container agent already
          # produced (spec-checks.k.json on disk). --dry-run loads that file
          # and prints the report without re-running any constraint `cmd`.
          bash .github/scripts/run-in-docker-no-claude.sh \
            '$PLUGIN_ROOT/bin/check --dry-run --full-report' \
            > /tmp/constraints.md 2>&1
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Export constraints report as job output
        id: constraints-out
        if: always()
        run: |
          {
            echo "body<<EOF_CONSTRAINTS_BODY"
            cat /tmp/constraints.md 2>/dev/null || echo "(no constraints report produced)"
            echo "EOF_CONSTRAINTS_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Record HEAD before commit
        id: head-before
        if: always()
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Agent commit
        id: agent-commit
        if: always() && steps.agent.outputs.exit_code == '0' && steps.constraints.outputs.exit_code == '0'
        env:
          MODEL:       ${{ needs.parse-issue.outputs.model }}
          PROMPT:      commit changes
          AGENT_IMAGE: ${{ needs.prepare-image.outputs.image }}
        run: bash .github/scripts/run-in-docker-claude.sh --allow-git-commit || true

      - name: Detect new commit
        id: detect-new-commit
        if: always()
        run: |
          if [ "${{ steps.head-before.outputs.sha }}" != "$(git rev-parse HEAD)" ]; then
            echo "has_new_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.detect-new-commit.outputs.has_new_commit == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ needs.choose-branch.outputs.branch }}"
          git push origin "$BRANCH"

      - name: Capture last commit message for PR body
        id: commit-msg
        if: steps.detect-new-commit.outputs.has_new_commit == 'true'
        run: |
          {
            echo "body<<EOF_COMMIT_BODY"
            git log -1 --pretty=%B HEAD
            echo "EOF_COMMIT_BODY"
          } >> "$GITHUB_OUTPUT"

  # Fork-PR creation and issue commenting split off the self-hosted runner.
  # Only needs GITHUB_TOKEN; does not require the agent runner or Docker.
  open-pr:
    needs: [fetch-issue, parse-issue, choose-branch, run-agent]
    # Handles: (a) fork-PR flow end-to-end, and (b) issue commenting for the
    # upstream-no-commit case (where open-upstream-pr is gated off). The
    # upstream-with-commit case is owned by open-upstream-pr.
    if: |
      always() && needs.run-agent.result != 'skipped' && needs.run-agent.result != 'cancelled'
      && (needs.parse-issue.outputs.merge_into_upstream != 'true'
          || needs.run-agent.outputs.has_new_commit != 'true')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check out repo (for composite actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Open PR inside fork
        if: needs.run-agent.outputs.has_new_commit == 'true' && needs.parse-issue.outputs.merge_into_upstream != 'true'
        uses: Clockwork-Pilot/autopilot/.github/actions/create-pr@main
        with:
          gh-token:    ${{ secrets.GITHUB_TOKEN }}
          pr-repo:     ${{ github.repository }}
          pr-head:     ${{ needs.choose-branch.outputs.branch }}
          pr-title:    ${{ needs.fetch-issue.outputs.title }}
          issue-ref:   ${{ github.repository }}#${{ inputs.issue_number }}
          commit-body: ${{ needs.run-agent.outputs.commit_msg }}

      - name: Comment agent result on issue
        uses: Clockwork-Pilot/autopilot/.github/actions/comment-agent-result@main
        with:
          gh-token:        ${{ secrets.GITHUB_TOKEN }}
          repo:            ${{ github.repository }}
          issue-number:    ${{ inputs.issue_number }}
          constraints-md:  ${{ needs.run-agent.outputs.constraints_md }}
          has-new-commit:  ${{ needs.run-agent.outputs.has_new_commit }}
          agent-exit-code: ${{ needs.run-agent.outputs.agent_exit_code }}

  # Cross-repo PR from fork → upstream. Isolated on a GitHub-hosted runner so
  # UPSTREAM_PR_TOKEN never enters the self-hosted agent job. The `upstream-pr`
  # environment must exist in fork settings with UPSTREAM_PR_TOKEN set;
  # see autopilot-ws/README.md "Opening PRs against the upstream repo".
  open-upstream-pr:
    needs: [fetch-issue, parse-issue, choose-branch, run-agent]
    if: needs.run-agent.outputs.has_new_commit == 'true' && needs.parse-issue.outputs.merge_into_upstream == 'true'
    runs-on: ubuntu-latest
    environment: upstream-pr
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out repo (for composite actions)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Resolve upstream repo
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM=$(gh api "repos/${{ github.repository }}" -q '.parent.full_name // ""')
          if [ -z "$UPSTREAM" ]; then
            echo "::error::merge_into_upstream: true but ${{ github.repository }} has no parent (not a fork)"
            exit 1
          fi
          echo "full_name=$UPSTREAM" >> "$GITHUB_OUTPUT"

      - name: Ensure UPSTREAM_PR_TOKEN is configured
        env:
          UPSTREAM_PR_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
        run: |
          : "${UPSTREAM_PR_TOKEN:?UPSTREAM_PR_TOKEN is not set in the 'upstream-pr' environment — see autopilot-ws/README.md 'Opening PRs against the upstream repo (optional)'}"

      - name: Open PR against upstream
        uses: Clockwork-Pilot/autopilot/.github/actions/create-pr@main
        with:
          gh-token:    ${{ secrets.UPSTREAM_PR_TOKEN }}
          pr-repo:     ${{ steps.upstream.outputs.full_name }}
          pr-head:     ${{ github.repository_owner }}:${{ needs.choose-branch.outputs.branch }}
          pr-title:    ${{ needs.fetch-issue.outputs.title }}
          issue-ref:   ${{ github.repository }}#${{ inputs.issue_number }}
          commit-body: ${{ needs.run-agent.outputs.commit_msg }}

      - name: Comment agent result on issue
        uses: Clockwork-Pilot/autopilot/.github/actions/comment-agent-result@main
        with:
          gh-token:        ${{ secrets.GITHUB_TOKEN }}
          repo:            ${{ github.repository }}
          issue-number:    ${{ inputs.issue_number }}
          constraints-md:  ${{ needs.run-agent.outputs.constraints_md }}
          has-new-commit:  ${{ needs.run-agent.outputs.has_new_commit }}
          agent-exit-code: ${{ needs.run-agent.outputs.agent_exit_code }}
